name: Symfony

on:
  - push

jobs:
  composer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: redis
      - name: Composer install
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
