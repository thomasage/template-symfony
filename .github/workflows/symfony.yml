name: Symfony

on:
  - push

jobs:
  composer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: '8.3'
      - uses: actions/upload-artifact@v3
        with:
          name: debug-output
          path: output.log
